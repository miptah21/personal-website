name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    
    # Add a Postgres service container for Payload CMS to connect to during Next.js build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: dummy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      
      - name: Lint Code
        run: bun run lint
      
      - name: Build Application
        run: bun run build
        env:
          # Payload CMS and Next.js require build-time variables if any are used in SSG
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-build' }}
          # Connect to the PostgreSQL service container created above
          DATABASE_URI: ${{ secrets.DATABASE_URI || 'postgres://dummy:dummy@localhost:5432/dummy' }}
